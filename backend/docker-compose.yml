services:
  postgres:
    image: postgres:16
    container_name: bmg-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bmg_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bmg_radar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bmg_radar"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  bmg_radar_pgdata:
